<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Thanvi ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff8fb1,#ffc3d6);
overflow:hidden;
}

.container{
text-align:center;
color:white;
animation:fadeIn 2s;
}

h1{
font-size:45px;
margin-bottom:15px;
}

p{
font-size:20px;
margin-bottom:30px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff4d88;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-100px);
opacity:0;
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>

</head>

<body>

<div class="container">
<h1>Hey Thanvi ❤️</h1>
<p>I made something very special just for you...</p>

<button onclick="nextPage()">Open My Surprise 🎁</button>
</div>

<script>

for(let i=0;i<30;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(4+Math.random()*4)+"s";

heart.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(heart);

}

function nextPage(){

alert("Coming next... 💖");

}

</script>

</body>
</html>
